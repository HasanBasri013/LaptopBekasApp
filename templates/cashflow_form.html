{% extends "base.html" %}
{% block title %}{{ 'Edit' if row else 'Tambah' }} Transaksi Kas{% endblock %}
{% block page_title %}{{ 'Edit' if row else 'Tambah' }} Transaksi Kas{% endblock %}

{% block content %}
<div class="card-panel" style="max-width:520px;"> 
    <form method="POST">
        <div class="mb-3">
            <label class="form-label">Tanggal</label>
            <input type="date" name="tanggal" class="form-control" value="{{ row.tanggal if row else now_date }}" required>
        </div>
        <div class="mb-3">
            <label class="form-label">Jenis Kas</label>
            <select name="tipe" class="form-select" required>
                <option value="masuk" {% if row and row.tipe == 'masuk' %}selected{% endif %}>Kas Masuk</option>
                <option value="keluar" {% if row and row.tipe == 'keluar' %}selected{% endif %}>Kas Keluar</option>
            </select>
        </div>
        <div class="mb-3">
            <label class="form-label">Keterangan</label>
            <input type="text" name="keterangan" class="form-control" value="{{ row.keterangan if row else '' }}" required>
        </div>
        <div class="mb-3">
            <label class="form-label">Nominal</label>
            <input type="number" name="nominal" class="form-control" min="0" step="0.01" value="{{ row.nominal if row else '' }}" required>
        </div>
        <div class="d-flex gap-2">
            <button type="submit" class="btn btn-primary"><i class="bi bi-save"></i> Simpan</button>
            <a href="{{ url_for('cashflow_view') }}" class="btn btn-outline-secondary">Batal</a>
        </div>
    </form>
</div>
{% endblock %}
