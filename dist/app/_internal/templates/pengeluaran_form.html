{% extends "base.html" %}
{% block title %}{{ 'Edit' if row else 'Tambah' }} Pengeluaran{% endblock %}
{% block page_title %}{{ 'Edit' if row else 'Tambah' }} Pengeluaran Kas{% endblock %}

{% block content %}
<div class="card-panel">
    <form method="POST">
        <div class="row g-3">
            <div class="col-md-4">
                <label class="form-label">Nomor</label>
                <input type="text" class="form-control" value="{{ nomor_preview }}" disabled>
            </div>
            <div class="col-md-4">
                <label class="form-label">Tanggal <span class="text-danger">*</span></label>
                <input type="date" name="tanggal" class="form-control" required
                       value="{{ row.tanggal if row else now_date }}">
            </div>
            <div class="col-md-4">
                <label class="form-label">Kategori <span class="text-danger">*</span></label>
                <select name="kategori" class="form-select" required>
                    {% for k in kategori_list %}
                    <option {% if row and row.kategori == k %}selected{% endif %}>{{ k }}</option>
                    {% endfor %}
                </select>
            </div>
            <div class="col-md-4">
                <label class="form-label">Jenis Transaksi <span class="text-danger">*</span></label>
                <select name="tipe" class="form-select" required>
                    <option value="keluar" {% if not row or row.tipe == 'keluar' %}selected{% endif %}>Kas Keluar</option>
                    <option value="masuk" {% if row and row.tipe == 'masuk' %}selected{% endif %}>Kas Masuk</option>
                </select>
            </div>

            <div class="col-md-8">
                <label class="form-label">Keterangan</label>
                <input type="text" name="keterangan" class="form-control" value="{{ row.keterangan if row else '' }}">
            </div>
            <div class="col-md-4">
                <label class="form-label">Nominal (Rp) <span class="text-danger">*</span></label>
                <input type="number" min="0" step="1" name="nominal" class="form-control input-rupiah" required
                       value="{{ row.nominal|int if row else 0 }}">
            </div>
        </div>

        <div class="mt-4 d-flex gap-2">
            <button type="submit" class="btn btn-primary"><i class="bi bi-save"></i> Simpan</button>
            <a href="{{ url_for('pengeluaran_list') }}" class="btn btn-outline-secondary">Batal</a>
        </div>
    </form>
</div>
{% endblock %}
