{% extends "base.html" %}
{% block title %}{{ 'Edit' if row else 'Tambah' }} Pengguna{% endblock %}
{% block page_title %}{{ 'Edit' if row else 'Tambah' }} Pengguna{% endblock %}

{% block content %}
<div class="card-panel" style="max-width:500px;">
    <form method="POST">
        <div class="mb-3">
            <label class="form-label">Username {% if not row %}<span class="text-danger">*</span>{% endif %}</label>
            <input type="text" name="username" class="form-control" value="{{ row.username if row else '' }}" {% if row %}disabled{% else %}required{% endif %}>
        </div>
        <div class="mb-3">
            <label class="form-label">Nama Lengkap</label>
            <input type="text" name="nama" class="form-control" value="{{ row.nama if row else '' }}">
        </div>
        <div class="mb-3">
            <label class="form-label">Role</label>
            <select name="role" class="form-select">
                {% for key, label in allowed_roles %}
                <option value="{{ key }}" {% if row and row.role == key %}selected{% endif %}>{{ label }}</option>
                {% endfor %}
            </select>
        </div>
        <div class="mb-3">
            <label class="form-label">Password {% if not row %}<span class="text-danger">*</span>{% endif %}</label>
            <input type="password" name="password" class="form-control" placeholder="{{ 'Kosongkan jika tidak ingin mengubah' if row else 'Minimal 4 karakter' }}" {% if not row %}required{% endif %}>
        </div>
        <div class="d-flex gap-2">
            <button type="submit" class="btn btn-primary"><i class="bi bi-save"></i> Simpan</button>
            <a href="{{ url_for('pengguna_list') }}" class="btn btn-outline-secondary">Batal</a>
        </div>
    </form>
</div>
{% endblock %}
